image:
  - macOS

platform:
  - x64
  - x86

branches:
  only:
    - master

build:
  verbosity: detailed

configuration:
  - Release
  
environment:
  artifactName: $(APPVEYOR_PROJECT_NAME)-$(APPVEYOR_REPO_COMMIT)-$(CONFIGURATION)

for:
  -
    matrix:
      only:
        - image: macOS
  
    install:
     - git submodule update --init --recursive
     - export PATH="$HOME/Qt/5.15.2/clang_64/bin:$PATH"
     - export LDFLAGS="-L/usr/local/opt/qt/lib"
     - export CPPFLAGS="-I/usr/local/opt/qt/include"
     - export PKG_CONFIG_PATH="/usr/local/opt/qt/lib/pkgconfig"

    before_build:
      - cmake --version
      - qmake -v

    build_script:
      - ./macos_wrap.sh macdeployqt

    after_build:
       - ls

    artifacts:
       - path: PE-bear.app.zip
